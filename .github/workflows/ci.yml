name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Test JS rewriting functionality
        run: |
          npm run test-js-rewriting

      - name: Automated fetch tests
        run: npm run fetch-tests

      - name: Test WebSocket functionality
        run: |
          npm run test-websocket

      - name: Test WebRTC functionality
        run: |
          npm run test-webrtc

      - name: Build and package
        run: npm run build

      - name: Docker build and test
        run: |
          docker build -t nexus-proxy .
          docker run -p 8080:8080 nexus-proxy &
          sleep 10
          curl http://localhost:8080 > /dev/null
          docker stop $(docker ps -q)

  js-rewriting-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run JS rewriting tests
        run: |
          npm run test-js-rewriting -- --coverage

  codeql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action@v3
        with:
          languages: javascript

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit
        run: npm audit --json > audit.json 

      - name: Upload security audit results
        uses: actions/upload-artifact@v4
        with:
          name: audit.json
          path: audit.json 

  cache-hits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get cache hits
        run: |
          echo "Cache hits: ${{ steps.cache-hits.outputs.cache-hits }}"

  websocket-performance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Test WebSocket performance
        run: |
          npm run test-websocket-performance

  webrtc-security-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run WebRTC security tests
        run: |
          npm run test-webrtc-security

  browser-compatibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Test browser compatibility
        run: |
          npm run test-browser-compatibility
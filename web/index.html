<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Builder System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        #app { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h1 { margin-bottom: 20px; text-align: center; }
        nav {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        nav button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        nav button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        main {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 30px;
            min-height: 400px;
        }
        .status { text-align: center; padding: 50px; }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        input {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
            width: 250px;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>🤖 AI Builder System</h1>
            <nav>
                <button onclick="showSection('dashboard')">Dashboard</button>
                <button onclick="showSection('models')">Models</button>
                <button onclick="showSection('inference')">Inference</button>
            </nav>
        </header>
        <main id="content">
            <div class="status">Loading...</div>
        </main>
    </div>
    <script>
        function showSection(section) {
            const content = document.getElementById('content');
            if (section === 'dashboard') {
                content.innerHTML = `
                    <div>
                        <h2>Dashboard</h2>
                        <p>AI System Online</p>
                        <p>Uptime: ${Math.floor(performance.now() / 1000)}s</p>
                    </div>
                `;
            } else if (section === 'models') {
                content.innerHTML = `
                    <div>
                        <h2>AI Models</h2>
                        <ul>
                            <li>Neural Network</li>
                            <li>Linear Model</li>
                        </ul>
                    </div>
                `;
            } else if (section === 'inference') {
                content.innerHTML = `
                    <div>
                        <h2>Inference Engine</h2>
                        <input type="text" id="input-data" placeholder="Enter numbers (comma-separated)">
                        <button onclick="runInference()">Predict</button>
                        <div id="result"></div>
                    </div>
                `;
            }
        }
        
        function runInference() {
            const input = document.getElementById('input-data').value;
            const numbers = input.split(',').map(Number);
            const result = numbers.map(x => x * 0.5);
            document.getElementById('result').innerHTML = `<p>Output: ${result.join(', ')}</p>`;
        }
        
        showSection('dashboard');
    </script>
</body>
</html>

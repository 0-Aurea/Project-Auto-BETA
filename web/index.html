<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Builder System</title>
    <style>
        /* General Reset & Body */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        /* App Container */
        #app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px; /* Spacing between main sections */
        }

        /* Header */
        header {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px 30px; /* Completed padding */
            margin-bottom: 20px; /* Added margin-bottom */
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        header h1 {
            font-size: 2.5em;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            letter-spacing: -0.5px;
        }

        /* Main Content Area */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Sections */
        section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        section h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #e0f2f7;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Input & Output Groups */
        .input-group, .output-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 1.1em;
            margin-bottom: 8px;
            font-weight: 500;
            color: #c9e0f6;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.2);
            color: white;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            font-size: 1em;
            min-height: 150px;
            resize: vertical;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }
        textarea:focus {
            outline: none;
            border-color: #a78bfa;
            background: rgba(0,0,0,0.3);
        }
        textarea::placeholder {
            color: rgba(255,255,255,0.5);
        }

        /* Buttons */
        button {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(45deg, #a78bfa 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-top: 10px;
            margin-bottom: 20px;
        }
        button:hover {
            background: linear-gradient(45deg, #8b5cf6 0%, #6d28d9 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            font-size: 0.9em;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>AI Builder System</h1>
            <!-- Future: Add navigation or user status here -->
        </header>

        <main>
            <section id="ai-interaction">
                <h2>AI Interaction</h2>
                <div class="input-group">
                    <label for="prompt-input">Enter your prompt:</label>
                    <textarea id="prompt-input" placeholder="e.g., 'Generate a Python function to reverse a string'"></textarea>
                </div>
                <button id="generate-button">Generate Response</button>
                <div class="output-group">
                    <label for="ai-output">AI Response:</label>
                    <textarea id="ai-output" readonly placeholder="AI response will appear here..."></textarea>
                </div>
            </section>

            <section id="settings">
                <h2>Settings</h2>
                <!-- Placeholder for future settings -->
                <p>Model selection, temperature, max tokens, etc. will go here to fine-tune AI behavior.</p>
                <p style="opacity: 0.7; font-size: 0.9em; margin-top: 10px;">(Not yet implemented)</p>
            </section>
        </main>

        <footer>
            <p>&copy; 2023 AI Builder. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>

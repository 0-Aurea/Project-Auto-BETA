<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Proxy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header>
      <nav>
        <div class="nav-logo" id="nav-logo"></div>
        <ul class="nav-links">
          <li><a href="#" id="history-toggle">History</a></li>
          <li><a href="#" id="bookmarks-toggle">Bookmarks</a></li>
          <li><a href="#" id="settings-toggle">Settings</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="loading-bar" id="loading-bar"></div>
      <div class="search-bar-container">
        <div class="search-bar" id="search-bar">
          <input type="search" id="search-input" placeholder="Search...">
          <div class="search-engine-toggle">
            <button class="search-engine-button" id="google-button">Google</button>
            <button class="search-engine-button" id="bing-button">Bing</button>
          </div>
          <button id="search-button">Go</button>
        </div>
      </div>
      <div class="tab-bar-container">
        <div class="tab-bar" id="tab-bar">
          <button id="new-tab-button">+</button>
        </div>
      </div>
      <div class="tab-manager-container">
        <div id="viewport"></div>
      </div>
    </main>
    <div class="settings-panel-container">
      <div class="settings-panel" id="settings-panel">
        <h2>Settings</h2>
        <label>
          <input type="checkbox" id="ad-block-enabled-checkbox">
          Ad Block Enabled
        </label>
        <label>
          <select id="search-engine-mode-select">
            <option value="google">Google</option>
            <option value="bing">Bing</option>
          </select>
          Search Engine
        </label>
      </div>
    </div>
    <div class="history-panel-container">
      <div class="history-panel" id="history-panel">
        <h2>History</h2>
        <ul id="history-list"></ul>
        <button id="clear-history-button">Clear History</button>
      </div>
    </div>
    <div class="bookmarks-panel-container">
      <div class="bookmarks-panel" id="bookmarks-panel">
        <h2>Bookmarks</h2>
        <ul id="bookmarks-list"></ul>
        <button id="add-bookmark-button">Add Bookmark</button>
      </div>
    </div>
  </div>
  <script type="module" src="script.js"></script>
</body>
</html>

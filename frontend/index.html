<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS Proxy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="prefetch" href="script.js" as="script">
    <link rel="prefetch" href="components/TabBar.js" as="script">
    <link rel="prefetch" href="components/SettingsPanel.js" as="script">
    <link rel="prefetch" href="components/BookmarksManager.js" as="script">
    <link rel="prefetch" href="components/ProxyHistory.js" as="script">
    <link rel="prefetch" href="components/SearchBar.js" as="script">
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <ul>
                    <li><a href="#" id="settings-toggle">Settings</a></li>
                    <li><a href="#" id="bookmarks-toggle">Bookmarks</a></li>
                    <li><a href="#" id="proxy-history-toggle">Proxy History</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <div class="search-bar">
                <input type="search" id="search-input" placeholder="Search...">
                <button id="search-button">Go</button>
                <div class="search-options">
                    <label>
                        <input type="radio" id="search-engine-google" name="search-engine" checked>
                        Google
                    </label>
                    <label>
                        <input type="radio" id="search-engine-bing" name="search-engine">
                        Bing
                    </label>
                </div>
            </div>
            <div class="tab-bar" id="tab-bar">
                <div id="tab-bar-component"></div>
            </div>
            <div id="tab-content"></div>
        </main>
        <div class="settings-panel" id="settings-panel">
            <div id="settings-panel-component"></div>
        </div>
        <div class="bookmarks-panel" id="bookmarks-panel">
            <div id="bookmarks-panel-component"></div>
        </div>
        <div class="proxy-history-panel" id="proxy-history-panel">
            <div id="proxy-history-panel-component"></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script type="module">
        import React from 'react';
        import ReactDOM from 'react-dom';
        import TabBar from './components/TabBar.js';
        import SettingsPanel from './components/SettingsPanel.js';
        import BookmarksManager from './components/BookmarksManager.js';
        import ProxyHistory from './components/ProxyHistory.js';
        import SearchBar from './components/SearchBar.js';

        ReactDOM.render(
            <React.StrictMode>
                <TabBar />
                <SettingsPanel />
                <BookmarksManager />
                <ProxyHistory />
                <SearchBar />
            </React.StrictMode>,
            document.getElementById('tab-bar-component')
        );

        ReactDOM.render(
            <React.StrictMode>
                <SettingsPanel />
            </React.StrictMode>,
            document.getElementById('settings-panel-component')
        );

        ReactDOM.render(
            <React.StrictMode>
                <BookmarksManager />
            </React.StrictMode>,
            document.getElementById('bookmarks-panel-component')
        );

        ReactDOM.render(
            <React.StrictMode>
                <ProxyHistory />
            </React.StrictMode>,
            document.getElementById('proxy-history-panel-component')
        );
    </script>
</body>
</html>

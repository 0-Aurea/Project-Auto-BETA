<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Proxy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header>
      <nav>
        <div class="nav-logo" id="nav-logo">
          <span class="logo-text">Nexus</span>
        </div>
        <ul class="nav-links">
          <li><a href="#" id="history-toggle">History</a></li>
          <li><a href="#" id="bookmarks-toggle">Bookmarks</a></li>
          <li><a href="#" id="settings-toggle">Settings</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="loading-bar" id="loading-bar"></div>
      <div class="search-bar-container">
        <div class="search-bar" id="search-bar"></div>
      </div>
      <div class="tab-bar-container">
        <div class="tab-bar" id="tab-bar">
          <button id="new-tab-button">+</button>
        </div>
      </div>
      <div class="viewport-container">
        <div id="viewport"></div>
      </div>
    </main>
    <div class="panel-overlay" id="panel-overlay"></div>
    <div class="settings-panel-container">
      <div class="settings-panel" id="settings-panel"></div>
    </div>
    <div class="history-panel-container">
      <div class="history-panel" id="history-panel"></div>
    </div>
    <div class="bookmarks-panel-container">
      <div class="bookmarks-panel" id="bookmarks-panel"></div>
    </div>
  </div>
  <script type="module" src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(registration => {
          console.log('Service Worker registered:', registration);
        })
        .catch(error => {
          console.error('Service Worker registration failed:', error);
        });
    } else {
      console.error('Service Workers are not supported.');
    }
  </script>
</body>
</html>

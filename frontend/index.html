<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Proxy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
  <div class="app-container">
    <header>
      <nav>
        <ul>
          <li><a href="#" id="settings-toggle">Settings</a></li>
          <li><a href="#" id="bookmarks-toggle">Bookmarks</a></li>
          <li><a href="#" id="proxy-history-toggle">Proxy History</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="search-bar-container">
        <SearchBar 
          onSearchQuery={handleSearchQuery} 
          onSearchEngineChange={handleSearchEngineChange}
        />
      </div>
      <div class="tab-bar-container">
        <TabBar 
          onTabChange={handleTabChange} 
          onNewTab={handleNewTab} 
          onTabClose={handleTabClose}
        />
      </div>
      <div class="tab-manager-container">
        <!-- TabManager component will be rendered here -->
      </div>
      <div class="settings-panel-container">
        <ProxySettings 
          onCacheEnabledChange={handleCacheEnabledChange}
          onCacheTTLChange={handleCacheTTLChange}
          onPrefetchEnabledChange={handlePrefetchEnabledChange}
          onAdBlockEnabledChange={handleAdBlockEnabledChange}
        />
      </div>
      <div class="proxy-history-container">
        <!-- ProxyHistory component will be rendered here -->
      </div>
      <div class="bookmarks-manager-container">
        <BookmarksManager 
          onBookmarksChange={handleBookmarksChange}
        />
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS Proxy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <ul>
                    <li><a href="#" id="settings-toggle">Settings</a></li>
                    <li><a href="#" id="bookmarks-toggle">Bookmarks</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <div class="search-bar">
                <input type="search" id="search-input" placeholder="Search...">
                <button id="search-button">Go</button>
            </div>
            <div class="tab-bar">
                <div class="tab" id="tab-0">
                    <iframe src="about:blank" frameborder="0" id="tab-0-iframe"></iframe>
                    <span id="tab-0-title">New Tab</span>
                    <button id="tab-0-close">X</button>
                </div>
            </div>
            <div class="settings-panel" id="settings-panel">
                <h2>Settings</h2>
                <form>
                    <label for="encoding-mode">Encoding Mode:</label>
                    <select id="encoding-mode">
                        <option value="xor-base64">XOR + Base64</option>
                        <option value="url-prefix">URL Prefix</option>
                    </select>
                    <br>
                    <label for="cache-toggle">Cache:</label>
                    <input type="checkbox" id="cache-toggle">
                    <br>
                    <label for="ad-block-toggle">Ad Block:</label>
                    <input type="checkbox" id="ad-block-toggle">
                </form>
            </div>
            <div class="bookmarks-panel" id="bookmarks-panel">
                <h2>Bookmarks</h2>
                <ul id="bookmarks-list"></ul>
                <input type="text" id="bookmark-input" placeholder="Add Bookmark...">
                <button id="bookmark-add">Add</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

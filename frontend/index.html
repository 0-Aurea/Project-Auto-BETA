<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Proxy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header>
      <nav>
        <ul>
          <li><a href="#" id="settings-toggle">Settings</a></li>
          <li><a href="#" id="bookmarks-toggle">Bookmarks</a></li>
          <li><a href="#" id="proxy-history-toggle">Proxy History</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="loading-bar" id="loading-bar"></div>
      <div class="search-bar-container">
        <div class="search-bar" id="search-bar">
          <input type="search" id="search-input" placeholder="Search...">
          <select id="search-engine-select">
            <option value="google">Google</option>
            <option value="bing">Bing</option>
          </select>
          <button id="search-button">Search</button>
        </div>
      </div>
      <div class="tab-bar-container">
        <div class="tab-bar" id="tab-bar">
        </div>
        <button id="new-tab-button">New Tab</button>
      </div>
      <div class="tab-manager-container">
        <div id="viewport"></div>
      </div>
      <div class="settings-panel-container">
        <div class="settings-panel" id="settings-panel">
          <h2>Settings</h2>
          <label>
            <input type="checkbox" id="ad-block-enabled-checkbox">
            Ad Block Enabled
          </label>
          <label>
            <select id="search-engine-mode-select">
              <option value="google">Google</option>
              <option value="bing">Bing</option>
            </select>
            Search Engine
          </label>
        </div>
      </div>
      <div class="proxy-history-container">
        <div class="proxy-history-panel" id="proxy-history-panel">
          <h2>Proxy History</h2>
          <ul id="proxy-history-list"></ul>
          <button id="clear-history-button">Clear History</button>
        </div>
      </div>
      <div class="bookmarks-manager-container">
        <div class="bookmarks-panel" id="bookmarks-panel">
          <h2>Bookmarks</h2>
          <ul id="bookmarks-list"></ul>
          <button id="add-bookmark-button">Add Bookmark</button>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Proxy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
  <div class="app-container">
    <header>
      <nav>
        <ul>
          <li><a href="#" id="settings-toggle">Settings</a></li>
          <li><a href="#" id="bookmarks-toggle">Bookmarks</a></li>
          <li><a href="#" id="proxy-history-toggle">Proxy History</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="search-bar-container">
        <input type="search" id="search-input" placeholder="Search...">
        <select id="search-engine-select">
          <option value="google">Google</option>
          <option value="bing">Bing</option>
        </select>
        <button id="search-button">Search</button>
      </div>
      <div class="tab-bar-container">
        <div class="tab-bar">
          <div class="tab" id="tab-0">New Tab</div>
        </div>
        <button id="new-tab-button">New Tab</button>
      </div>
      <div class="tab-manager-container">
        <iframe src="about:blank" id="tab-iframe-0" frameborder="0"></iframe>
      </div>
      <div class="settings-panel-container">
        <div class="settings-panel">
          <h2>Settings</h2>
          <label>
            <input type="checkbox" id="cache-enabled-checkbox">
            Cache Enabled
          </label>
          <label>
            <input type="number" id="cache-ttl-input" value="3600">
            Cache TTL (seconds)
          </label>
          <label>
            <input type="checkbox" id="prefetch-enabled-checkbox">
            Prefetch Enabled
          </label>
          <label>
            <input type="checkbox" id="ad-block-enabled-checkbox">
            Ad Block Enabled
          </label>
          <label>
            <select id="encoding-mode-select">
              <option value="xor-base64">XOR + Base64</option>
            </select>
            Encoding Mode
          </label>
        </div>
      </div>
      <div class="proxy-history-container">
        <h2>Proxy History</h2>
        <ul id="proxy-history-list"></ul>
        <button id="clear-history-button">Clear History</button>
      </div>
      <div class="bookmarks-manager-container">
        <h2>Bookmarks</h2>
        <ul id="bookmarks-list"></ul>
        <button id="add-bookmark-button">Add Bookmark</button>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>

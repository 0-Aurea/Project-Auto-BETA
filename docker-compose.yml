version: '3'

services:
  nexus:
    build: .
    restart: always
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - PROXY_TIMEOUT=30000
    volumes:
      - ./frontend:/app/frontend
      - ./server:/app/server
      - ./package.json:/app/package.json
    depends_on:
      - nginx
    networks:
      - nexus-net

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/nginx.conf
      - ./logs:/var/log/nginx
      - ./certs:/etc/nginx/certs
    command: /bin/bash -c "nginx -t && nginx -g 'daemon off;'"
    networks:
      - nexus-net

volumes:
  logs: {}
  certs: {}

networks:
  nexus-net:
    driver: bridge
version: '3'

services:
  nexus:
    build: .
    restart: always
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    volumes:
      - ./nexus:/app
    depends_on:
      - nginx

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./logs:/var/log/nginx
      - ./certs:/etc/nginx/certs
    command: /bin/bash -c "nginx -t && nginx -g 'daemon off;'"

volumes:
  logs: {}
  certs: {}

networks:
  nexus-net:
    driver: bridge

services:
  nexus:
    networks:
      - nexus-net

  nginx:
    networks:
      - nexus-net
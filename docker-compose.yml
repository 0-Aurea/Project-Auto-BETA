version: '3'

services:
  nexus:
    build: .
    restart: always
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    volumes:
      - ./nexus:/app
    depends_on:
      - nginx

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./logs:/var/log/nginx

volumes:
  logs: {}